spring.application.name=procrastiless-api
server.port=8080

spring.sql.init.mode=never
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gradflow}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:gradflow}
spring.datasource.password=${DATABASE_PASSWORD:gradflow}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5180,http://127.0.0.1:5180}
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

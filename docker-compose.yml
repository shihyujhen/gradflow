services:
  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: gradflow-frontend
    depends_on:
      - backend
    ports:
      - "5180:80"

  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    container_name: gradflow-postgres
    environment:
      POSTGRES_DB: gradflow
      POSTGRES_USER: gradflow
      POSTGRES_PASSWORD: gradflow
    ports:
      - "55432:5432"
    volumes:
      - gradflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradflow -d gradflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    restart: unless-stopped
    build:
      context: ./backend
    container_name: gradflow-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/gradflow
      DATABASE_USERNAME: gradflow
      DATABASE_PASSWORD: gradflow
      APP_CORS_ALLOWED_ORIGIN: http://54.65.20.129
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "8082:8080"

  nginx:
    image: nginx:latest
    container_name: gradflow-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
    gradflow-postgres-data:
